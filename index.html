<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slayer Scouting Report</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div class="hero__intro">
          <div class="hero__intro-text">
            <h1>Slayer Scouting Report</h1>
            <p>
              Live dashboard of MLN Statistics. Filter by pitcher and batter to update the charts below.
            </p>
          </div>
          <img
            src="./assets/sun-logo.png"
            alt="SUN Slayers logo"
            class="hero__logo"
            width="120"
            height="120"
          />
        </div>

        <div class="hero__body scout-stack">
          <section class="scout-stack__panel matchup-panel">
            <div class="matchup-panel__column">
              <div class="control-group control-group--centered">
                <label for="pitcher-select">Pitcher</label>
                <select id="pitcher-select" aria-label="Filter by pitcher"></select>
              </div>
              <div id="pitcher-stats" class="player-stats-block" aria-label="Pitcher stats"></div>
            </div>

            <div class="matchup-panel__column">
              <div class="control-group control-group--centered">
                <label for="batter-select">Batter</label>
                <select id="batter-select" aria-label="Filter by batter"></select>
              </div>
              <div id="batter-stats" class="player-stats-block" aria-label="Batter stats"></div>
            </div>
          </section>

          <aside class="game-panel scout-stack__panel" aria-label="Live game">
            <div class="game-panel__main">
              <div class="game-score-panel">
                <div id="game-score" class="game-score" aria-live="polite">—</div>
                <div id="game-score-teams" class="game-score__teams"></div>
                <p id="live-game-context" class="live-game-context"></p>
              </div>

              <div class="game-situation-group">
                <div id="first-pitch-mode-banner" class="first-pitch-banner" hidden>
                  First Pitch Mode is active
                </div>
                <div class="game-situation-group__body">
                  <div id="situation-graphic" class="hero-situation" aria-label="Runners on base and outs">
                    <svg
                      class="situation-display"
                      viewBox="27 14 46 50"
                      role="img"
                      aria-hidden="true"
                    >
                      <polygon class="situation-base situation-base--second" points="50,21 58,29 50,37 42,29" />
                      <polygon class="situation-base situation-base--third" points="41,30 49,38 41,46 33,38" />
                      <polygon class="situation-base situation-base--first" points="59,30 67,38 59,46 51,38" />
                      <circle class="situation-out situation-out--1" cx="44.75" cy="56" r="4.5" />
                      <circle class="situation-out situation-out--2" cx="55.25" cy="56" r="4.5" />
                    </svg>
                  </div>
                  <div class="game-mode-controls">
                    <label class="first-pitch-mode-control" for="first-pitch-mode">
                      <input type="checkbox" id="first-pitch-mode" />
                      First Pitch Mode
                    </label>
                    <label class="first-pitch-mode-control" for="pitcher-mode">
                      <input type="checkbox" id="pitcher-mode" />
                      Pitcher Mode
                    </label>
                  </div>
                  <button type="button" id="export-page-btn" class="page-export-button">
                    Export
                  </button>
                </div>
              </div>
            </div>

            <div class="game-panel__meta">
              <span class="pill" id="row-count">0 plays</span>
              <span id="status">Initializing...</span>
            </div>
          </aside>
        </div>
      </header>

      <section id="batter-bucket-panel" class="batter-bucket-panel" hidden aria-label="Pitch bucket tables"></section>

      <section id="attack-zone-panel" class="attack-zone-panel" hidden aria-label="Attack zone"></section>

      <section class="chart-grid" id="chart-grid" aria-live="polite"></section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
